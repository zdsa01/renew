name: Auto Renew Aida

on:
  #schedule:
  # - cron: '0 */20 * * *' # 每20小时运行一次
  workflow_dispatch: # 允许手动触发

jobs:
  Renew-Aida:
    runs-on: ubuntu-latest
    permissions:
      actions: write  
      contents: read
    
    steps:
      - name: 拉取仓库
        uses: actions/checkout@v6
     
      - name: ⚙ 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
  
      - name: 🛠️ 安装系统依赖和 Python 依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-utils fonts-noto-cjk
          sudo apt-get install -y google-chrome-stable
          pip install seleniumbase requests
  
      - name: ⚙ 设置代理 (sing-box)
        continue-on-error: true
        env:
          NODE_LINK: ${{ secrets.NODE_LINK }}
        run: |
          bash <(wget -qO- https://main.ssss.nyc.mn/setup_proxy.sh)
  
      - name: 🚀 运行续期脚本
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          IS_PROXY: "false"  # 必须改为 false，告诉脚本不要走代理
          PROXY_SERVER: ""   # 清空代理服务器地址
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python3 aida_renew.py
            
      - name: 📸 上传失败截图与日志 (仅在运行失败或超时时保留)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: |
            *.png
            *.jpg
          retention-days: 3
          
      - name: 🧹 清理旧的工作流运行记录
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          runs=$(gh run list --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
          count=0
          for run_id in $runs; do
            count=$((count + 1))
            if [ $count -gt 1 ]; then
              echo "删除运行记录: $run_id"
              gh run delete $run_id || true
            fi
          done
